#cloud-config
hostname: ${hostname}
fqdn: ${hostname}.local
manage_etc_hosts: true

# Enable root login with SSH key
disable_root: false
ssh_pwauth: false

users:
  - default
  - name: root
    lock_passwd: false
    ssh_authorized_keys:
      - ${file("~/.ssh/id_rsa.pub")}

# System packages to install
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - chrony
  - socat
  - conntrack
  - ipset

# Configure NTP for time synchronization
write_files:
  - path: /etc/chrony/chrony.conf
    content: |
      pool ntp.ubuntu.com        iburst maxsources 4
      pool 0.ubuntu.pool.ntp.org iburst maxsources 1
      pool 1.ubuntu.pool.ntp.org iburst maxsources 1
      pool 2.ubuntu.pool.ntp.org iburst maxsources 2
      
      driftfile /var/lib/chrony/chrony.drift
      logdir /var/log/chrony
      maxupdateskew 100.0
      rtcsync
      makestep 1 3
    owner: root:root
    permissions: '0644'

  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root:root
    permissions: '0644'

  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    owner: root:root
    permissions: '0644'

  - path: /etc/containerd/config.toml
    content: |
      version = 2
      [plugins]
        [plugins."io.containerd.grpc.v1.cri"]
          [plugins."io.containerd.grpc.v1.cri".containerd]
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                runtime_type = "io.containerd.runc.v2"
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                  SystemdCgroup = true
    owner: root:root
    permissions: '0644'

runcmd:
  # Disable swap
  - swapoff -a
  - sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
  
  # Start and enable chrony
  - systemctl enable chrony
  - systemctl restart chrony
  
  # Load kernel modules
  - modprobe overlay
  - modprobe br_netfilter
  
  # Apply sysctl params
  - sysctl --system
  
  # Install containerd
  - apt-get update
  - apt-get install -y containerd
  - mkdir -p /etc/containerd
  - systemctl restart containerd
  - systemctl enable containerd
  
  # Add Kubernetes apt repository
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
  
  # Install Kubernetes components
  - apt-get update
  - apt-get install -y kubelet kubeadm kubectl
  - apt-mark hold kubelet kubeadm kubectl
  - systemctl enable kubelet
  
  # Configure crictl to use containerd
  - crictl config runtime-endpoint unix:///run/containerd/containerd.sock
  
  # Enable root SSH login
  - sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - sed -i 's/PermitRootLogin no/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - systemctl restart sshd
  
  # Create .ssh directory for root
  - mkdir -p /root/.ssh
  - chmod 700 /root/.ssh
  - cp /home/azureuser/.ssh/authorized_keys /root/.ssh/authorized_keys
  - chmod 600 /root/.ssh/authorized_keys
  - chown -R root:root /root/.ssh

# Reboot after initial setup to ensure all changes take effect
power_state:
  mode: reboot
  message: Rebooting after initial Kubernetes setup
  timeout: 30
  condition: True

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-frontend
  namespace: prod-database
spec:
  podSelector:
    matchLabels:
      app: portfolio-frontend
  policyTypes:
    - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
      - protocol: TCP
        port: 80
    

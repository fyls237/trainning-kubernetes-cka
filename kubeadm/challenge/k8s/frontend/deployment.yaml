apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
  namespace: prod-database
  labels:
    app: portfolio-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
        tier: frontend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: web
        image: ghcr.io/fyls237/portfolio-frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

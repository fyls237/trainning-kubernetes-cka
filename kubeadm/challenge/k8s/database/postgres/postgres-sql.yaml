apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: prod-database
  labels:
    app: postgres
    tier: database
spec:
  selector:
    matchLabels:
      app: postgres
      tier: database
  serviceName: "postgres-service"
  replicas: 1
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgres
        image: postgres:18
        env: 
        - name: POSTGRES_PASSWORD
          value: "postrespass"
        - name: PGDATA
          value: /var/lib/postgresql/data
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 5Gi
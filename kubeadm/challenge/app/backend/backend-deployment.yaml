apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  namespace: prod-database
  labels:
    app: portfolio-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-backend
  template:
    metadata:
      labels:
        app: portfolio-backend
        tier: backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: api
        image: ghcr.io/fyls237/portfolio-backend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: PG_HOST
          value: "postgres-service"
        - name: PG_DB
          value: "portfolio_db"
        - name: PG_USER
          value: "postgres"
        - name: PG_PASSWORD
          value: "postrespass"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-backend-service
  namespace: prod-database
spec:
  selector:
    app: portfolio-backend
    tier: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-front
  labels:
    app: app-shop
    tier: frontend
  namespace: prod-app-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-shop
      tier: frontend
  template:
    metadata:
      labels:
        app: app-shop
        tier: frontend
    spec:
      containers:
      - name: shop-front
        image: nginx:alpine
        ports:
        - containerPort: 80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmapvol
  labels:
    app: DemoApp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: configmapvol
  template:
    metadata:
      labels:
        app: configmapvol
    spec:
      containers:
        - name: demo-container-nginx
          image: nginx
          volumeMounts:
            - name: configmap-volume
              mountPath: /etc/config
      volumes: 
        - name: configmap-volume
          configMap:
            name: config-appdemo


  

      
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-deployment
  labels: 
    app: secret-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secret-app
  template:
    metadata:
      labels:
        app: secret-app
    spec: 
      containers:
        - name: test-secrets
          image: nginx
          env: 
            - name: password
              valueFrom: 
                secretKeyRef:
                  name: yml-secret 
                  key: password
          volumeMounts:
            - name: secret-volume
              mountPath: /etc/secret
              readOnly: true
      volumes:
        - name: secret-volume
          secret:
            secretName: yml-secret


  